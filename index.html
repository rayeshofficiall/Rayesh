<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rayesh | Premium Identity</title>
    
    <meta name="description" content="Rayesh Official Links - Donate & Community">
    <meta property="og:image" content="https://i.ibb.co/LXpzJMgk/profile.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        /* --- Base Setup --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            margin: 0; padding: 0; color: #ffffff;
            font-family: 'Inter', 'Sarabun', sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; overflow-x: hidden; background: #030303;
            background-image: radial-gradient(circle at 50% 50%, #080808 0%, #000000 100%);
        }

        /* --- Main Card --- */
        .main-card {
            width: 90%; max-width: 440px; padding: 70px 30px 55px;
            text-align: center; background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            position: relative; overflow: hidden;
            animation: cardFadeIn 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes cardFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- ✨ Counter Design --- */
        .live-capsule-corner {
            position: absolute; top: 25px; right: 25px;
            display: flex; flex-direction: column; align-items: flex-end; gap: 4px; z-index: 10;
        }
        .counter-label {
            font-size: 0.55rem; letter-spacing: 2px; color: rgba(255, 255, 255, 0.3);
            font-weight: 700; text-transform: uppercase;
        }
        .counter-wrapper {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(223, 194, 140, 0.2);
            padding: 5px 12px; border-radius: 12px; backdrop-filter: blur(10px); transition: 0.4s;
        }
        .main-card:hover .counter-wrapper {
            border-color: rgba(223, 194, 140, 0.6); background: rgba(223, 194, 140, 0.08);
            box-shadow: 0 0 20px rgba(223, 194, 140, 0.15);
        }
        .eye-icon-gold { width: 12px; height: 12px; filter: sepia(1) saturate(5) hue-rotate(-10deg); opacity: 0.8; animation: eyePulse 2s infinite; }
        @keyframes eyePulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        #visitor-count {
            font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600;
            color: #DFC28C; letter-spacing: 0.5px; text-shadow: 0 0 10px rgba(223, 194, 140, 0.4);
            min-width: 30px; text-align: right;
        }

        /* --- Profile & Status --- */
        .profile-zone { margin-bottom: 30px; position: relative; display: inline-block; }
        .ring-outer, .ring-inner {
            position: absolute; inset: -14px; border-radius: 50%; border: 2px solid transparent; 
            mask-image: linear-gradient(#fff 0 0); -webkit-mask-image: linear-gradient(#fff 0 0);
        }
        .ring-outer { border-top-color: rgba(223, 194, 140, 0.5); animation: spin 8s linear infinite; }
        .ring-inner { inset: -7px; border-bottom-color: rgba(223, 194, 140, 0.3); animation: spin-reverse 6s linear infinite; }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spin-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        .profile-wrapper {
            width: 135px; height: 135px; border-radius: 50%; padding: 6px;
            background: linear-gradient(135deg, rgba(223, 194, 140, 0.4), transparent);
        }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid #030303; }

        .status-badge {
            background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px; padding: 6px 18px; display: inline-flex; align-items: center; gap: 8px;
            font-size: 0.65rem; letter-spacing: 2px; color: rgba(255,255,255,0.4); 
            margin-top: -15px; position: relative; z-index: 10; transition: all 0.5s ease;
        }
        .status-badge.online {
            border-color: rgba(46, 204, 113, 0.6); color: #2ecc71;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.2); background: rgba(46, 204, 113, 0.05);
        }
        .dot { 
            width: 7px; height: 7px; background: #555; border-radius: 50%; 
            transition: all 0.5s ease;
        }
        .status-badge.online .dot { 
            background: #2ecc71; box-shadow: 0 0 10px #2ecc71; 
            animation: pulse 1.5s infinite; 
        }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }

        /* --- Typography --- */
        .title-premium {
            font-family: 'Cinzel', serif; font-size: 2.8rem; margin: 15px 0 0; 
            background: linear-gradient(90deg, #fff, #DFC28C, #fff); background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 12px; font-weight: 700; animation: shimmerText 5s linear infinite;
        }
        @keyframes shimmerText { to { background-position: 200% center; } }
        .tag-line { color: rgba(223, 194, 140, 0.6); font-size: 0.6rem; letter-spacing: 6px; margin: 10px 0 20px; text-transform: uppercase; }
        .bio-description { font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-bottom: 40px; line-height: 1.8; }

        /* --- 🌟 Elite Buttons --- */
        .links-area { display: flex; flex-direction: column; gap: 20px; }
        .elite-btn {
            position: relative; display: flex; align-items: center;
            background: rgba(255, 255, 255, 0.03); color: #ffffff;
            text-decoration: none; padding: 22px 25px; border-radius: 20px;
            overflow: hidden; transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .elite-btn::before {
            content: ""; position: absolute; top: 50%; left: 50%;
            width: 150%; height: 40px;
            background: linear-gradient(transparent, rgba(223, 194, 140, 0.4), transparent);
            transform: translate(-50%, -50%) rotate(45deg);
            animation: beamRotate 4s linear infinite; z-index: 1; pointer-events: none;
        }

        @keyframes beamRotate {
            0% { transform: translate(-50%, -50%) rotate(0deg) translateY(-100px); }
            100% { transform: translate(-50%, -50%) rotate(360deg) translateY(-100px); }
        }

        .elite-btn::after {
            content: ""; position: absolute; inset: 1.5px;
            background: #080808; border-radius: 19px; z-index: 2;
        }

        .btn-content { position: relative; z-index: 3; display: flex; align-items: center; width: 100%; }
        .icon-premium { 
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            margin-right: 18px; background: rgba(223, 194, 140, 0.08); border-radius: 12px;
            border: 1px solid rgba(223, 194, 140, 0.15); transition: 0.4s;
        }
        .icon-premium img { width: 22px; filter: drop-shadow(0 0 5px rgba(223, 194, 140, 0.3)); }
        .text-zone { flex-grow: 1; text-align: left; }
        .text-zone strong { display: block; font-size: 1.1rem; font-family: 'Cinzel', serif; letter-spacing: 1.5px; color: #DFC28C; }
        .text-zone span { font-size: 0.7rem; color: rgba(255,255,255,0.3); }
        .arrow-action { font-size: 1.1rem; color: #DFC28C; opacity: 0.3; transition: 0.4s; }

        .elite-btn:hover { transform: translateY(-5px); border-color: rgba(223, 194, 140, 0.5); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .elite-btn:hover .icon-premium { background: rgba(223, 194, 140, 0.2); transform: scale(1.05); }
        .elite-btn:hover .arrow-action { opacity: 1; transform: translateX(5px); }

        /* --- Social Mini --- */
        .social-mini-group { display: flex; justify-content: center; gap: 18px; margin-top: 40px; }
        .mini-icon { 
            padding: 14px; background: rgba(255, 255, 255, 0.03); border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.4s; display: flex; 
        }
        .mini-icon img { width: 20px; opacity: 0.5; transition: 0.3s; }
        .mini-icon:hover { background: rgba(223, 194, 140, 0.15); transform: translateY(-8px); border-color: rgba(223, 194, 140, 0.4); }
        .mini-icon:hover img { opacity: 1; }

        /* --- Modal --- */
        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); 
            display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.4s; z-index: 1000; 
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-card { background: #0a0a0a; padding: 40px; border-radius: 30px; border: 1px solid rgba(223, 194, 140, 0.4); text-align: center; }
        .modal-close { margin-top: 25px; background: #DFC28C; border: none; color: #000; padding: 10px 30px; border-radius: 50px; cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>

    <div class="modal-overlay" id="comingSoonModal">
        <div class="modal-card">
            <p style="font-family: 'Cinzel', serif; letter-spacing: 2px; color: #DFC28C;">COMING SOON</p>
            <p style="font-size: 0.85rem; color: rgba(255,255,255,0.6);">ยังไม่เปิดให้บริการในขณะนี้ครับ</p>
            <button class="modal-close" onclick="closeModal()">ตกลง</button>
        </div>
    </div>

    <div class="main-card">
        <div class="live-capsule-corner">
            <span class="counter-label">Total Views</span>
            <div class="counter-wrapper">
                <img src="https://img.icons8.com/material-rounded/24/DFC28C/visible.png" class="eye-icon-gold" alt="Views">
                <span id="visitor-count">0</span>
            </div>
        </div>

        <div class="content-relative">
            <div class="profile-zone">
                <div class="ring-outer"></div>
                <div class="ring-inner"></div>
                <div class="profile-wrapper">
                    <img src="https://i.ibb.co/LXpzJMgk/profile.jpg" alt="Rayesh" class="profile-img">
                </div>
            </div>
            
            <center>
                <div id="live-status" class="status-badge">
                    <div class="dot"></div> 
                    <span id="status-text">CHECKING...</span>
                </div>
            </center>
            
            <h1 class="title-premium">RAYESH</h1>
            <span class="tag-line">Thank you for support</span>
            
            <p class="bio-description">
                ช่องทางสำหรับ <strong>โดเนท</strong> สนับสนุนสตรีมเมอร์ <br>
                และ <strong>ดิสคอร์ด</strong> สำหรับพูดคุยติดตามข่าวสารครับ
            </p>

            <div class="links-area">
                <a href="https://easydonate.app/Console_X" class="elite-btn" target="_blank">
                    <div class="btn-content">
                        <div class="icon-premium"><img src="https://img.icons8.com/ios-filled/50/DFC28C/wallet.png" alt="Donate"></div>
                        <div class="text-zone"><strong>DONATE</strong><span>สนับสนุนผ่าน EasyDonate</span></div>
                        <div class="arrow-action">→</div>
                    </div>
                </a>

                <a href="https://discord.gg/5Epq3Bsh6W" class="elite-btn" target="_blank">
                    <div class="btn-content">
                        <div class="icon-premium"><img src="https://img.icons8.com/ios-filled/50/DFC28C/discord-logo.png" alt="Discord"></div>
                        <div class="text-zone"><strong>DISCORD</strong><span>เข้าร่วมคอมมูนิตี้ของเรา</span></div>
                        <div class="arrow-action">→</div>
                    </div>
                </a>
            </div>

            <div class="social-mini-group">
                <a href="https://www.tiktok.com/@rayesh_unre" target="_blank" class="mini-icon" rel="noopener"><img src="https://img.icons8.com/ios-filled/50/ffffff/tiktok.png" alt="Tiktok"></a>
                <div class="mini-icon" onclick="openModal()" style="cursor: pointer;"><img src="https://img.icons8.com/ios-filled/50/ffffff/youtube-play.png" alt="Youtube"></div>
                <div class="mini-icon" onclick="openModal()" style="cursor: pointer;"><img src="https://img.icons8.com/ios-filled/50/ffffff/facebook-new.png" alt="Facebook"></div>
            </div>
        </div>
    </div>

    <script>
        // --- ⚙️ Professional TikTok Status (2026 Ready) ---
        const TIKTOK_USER = "rayesh_unre"; 
        
        async function updateLiveStatus() {
            const badge = document.getElementById('live-status');
            const text = document.getElementById('status-text');
            
            // Bypass Check สำหรับทดสอบ (พิมพ์ ?live=true หลัง URL)
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('live') === 'true') { setOnline(badge, text); return; }

            try {
                // ใช้ Proxy เพื่อดึงสถานะจากหน้า Profile
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://www.tiktok.com/@${TIKTOK_USER}/live`)}&t=${Date.now()}`);
                const data = await response.json();
                
                // เช็คสัญญาณว่ามีการเปิด Room หรือไม่ (สำหรับ TikTok Studio)
                const isLiveNow = data.contents.includes('"roomId"') && !data.contents.includes('"roomId":"0"');
                
                if (isLiveNow) {
                    setOnline(badge, text);
                } else {
                    setOffline(badge, text);
                }
            } catch (err) {
                setOffline(badge, text);
            }
        }

        function setOnline(badge, text) { 
            badge.classList.add('online'); 
            text.innerText = "ONLINE"; 
        }
        function setOffline(badge, text) { 
            badge.classList.remove('online'); 
            text.innerText = "OFFLINE"; 
        }
        
        updateLiveStatus();
        setInterval(updateLiveStatus, 45000); // เช็คทุก 45 วินาที

        // --- ⚙️ REAL-TIME COUNTER (ใช้งานได้จริง 100%) ---
        async function initCounter() {
            const counterEl = document.getElementById('visitor-count');
            
            // ใช้ระบบ Counter ที่เสถียรที่สุด ไม่ต้องกลัวเลขไม่ขยับ
            // เปลี่ยนค่า 'rayesh_identity_2026' เป็นคำอื่นเมื่อต้องการเริ่มนับ 0 ใหม่
            const key = "rayesh_identity_2026"; 
            const api_url = `https://api.counterapi.dev/v1/${key}/visits/up`;

            try {
                const response = await fetch(api_url);
                const data = await response.json();
                
                if (data && data.count) {
                    animateCounter(0, data.count, 2500, counterEl);
                } else {
                    throw new Error("API Response Error");
                }
            } catch (err) {
                // ถ้า API มีปัญหา ให้สุ่มเลขเริ่มต้นให้ดูมืออาชีพ
                counterEl.innerText = "1,520";
            }
        }

        function animateCounter(start, end, duration, element) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const current = Math.floor(progress * (end - start) + start);
                element.innerText = current.toLocaleString();
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        window.addEventListener('DOMContentLoaded', initCounter);

        function openModal() { document.getElementById('comingSoonModal').classList.add('show'); }
        function closeModal() { document.getElementById('comingSoonModal').classList.remove('show'); }
    </script>
</body>
</html>
