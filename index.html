<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rayesh | Premium Identity</title>
    
    <meta name="description" content="Rayesh Official Links - Donate & Community">
    <meta property="og:image" content="https://i.ibb.co/LXpzJMgk/profile.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        /* --- Base & Performance Setup --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            margin: 0; padding: 0; color: #ffffff;
            font-family: 'Inter', 'Sarabun', sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; overflow-x: hidden; background: #030303;
            background-image: radial-gradient(circle at 50% 50%, #080808 0%, #000000 100%);
        }

        /* --- Main Card --- */
        .main-card {
            width: 90%; max-width: 440px; padding: 70px 30px 55px;
            text-align: center; background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            position: relative; overflow: hidden;
            animation: cardFadeIn 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes cardFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Analytics Corner --- */
        .live-capsule-corner {
            position: absolute; top: 22px; right: 25px;
            display: inline-flex; align-items: center; gap: 7px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 5px 14px; border-radius: 50px; opacity: 0.7; transition: 0.4s; z-index: 10;
        }
        .main-card:hover .live-capsule-corner { opacity: 1; border-color: rgba(223, 194, 140, 0.4); }
        .eye-icon-micro { width: 14px; height: 14px; filter: brightness(0) invert(1) opacity(0.5); }
        .c-label { font-size: 0.5rem; letter-spacing: 1.5px; color: rgba(255,255,255,0.4); font-weight: 700; }
        
        /* === Supreme Balance Profile & Rings === */
        .profile-zone { margin-bottom: 25px; position: relative; display: inline-block; z-index: 1; }
        
        .ring-outer, .ring-inner {
            position: absolute; border-radius: 50%; border: 2px solid transparent; 
            -webkit-mask-image: linear-gradient(#fff 0 0); mask-image: linear-gradient(#fff 0 0);
        }

        .ring-outer {
            inset: -14px;
            background-image: conic-gradient(from 0deg, rgba(223, 194, 140, 0) 0%, rgba(223, 194, 140, 0.7) 25%, rgba(255, 255, 255, 0.8) 30%, rgba(223, 194, 140, 0.7) 35%, rgba(223, 194, 140, 0) 50%);
            filter: drop-shadow(0 0 3px rgba(223, 194, 140, 0.2));
            animation: spin 10s linear infinite; 
        }

        .ring-inner {
            inset: -7px;
            background-image: conic-gradient(from 180deg, rgba(223, 194, 140, 0) 0%, rgba(223, 194, 140, 0.5) 25%, rgba(255, 250, 240, 0.7) 30%, rgba(223, 194, 140, 0.5) 35%, rgba(223, 194, 140, 0) 50%);
            animation: spin-reverse 7s linear infinite;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spin-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        .profile-wrapper {
            width: 110px; height: 110px; 
            border-radius: 50%; padding: 5px;
            background: linear-gradient(135deg, rgba(223, 194, 140, 0.3), transparent);
            position: relative; z-index: 2;
        }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid #030303; }

        /* --- Status Badge --- */
        .status-badge {
            background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(223, 194, 140, 0.4);
            border-radius: 50px; padding: 6px 18px; display: inline-flex; align-items: center; gap: 8px;
            font-size: 0.65rem; letter-spacing: 2px; color: #DFC28C; margin-top: -15px; position: relative; z-index: 10;
        }
        .dot { width: 7px; height: 7px; background: #ff4d4d; border-radius: 50%; box-shadow: 0 0 10px #ff4d4d; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }

        /* --- Typography (Professional Finetuned) --- */
        .title-premium {
            font-family: 'Cinzel', serif; font-size: 2.5rem; margin: 12px 0 0; 
            background: linear-gradient(90deg, #fff, #DFC28C, #fff); background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 10px; font-weight: 700; animation: shimmerText 5s linear infinite;
        }
        @keyframes shimmerText { to { background-position: 200% center; } }
        .tag-line { color: rgba(223, 194, 140, 0.6); font-size: 0.55rem; letter-spacing: 5px; margin: 8px 0 18px; text-transform: uppercase; }
        .bio-description { font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-bottom: 35px; line-height: 1.7; }
        .bio-description strong { color: #DFC28C; font-weight: 500; }

        /* --- 🌟 Elite Buttons --- */
        .links-area { display: flex; flex-direction: column; gap: 18px; }
        
        .elite-btn {
            position: relative; display: flex; align-items: center;
            background: rgba(255, 255, 255, 0.02); color: #ffffff;
            text-decoration: none; padding: 18px 22px; border-radius: 18px;
            overflow: hidden; transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .elite-btn::before {
            content: ""; position: absolute; top: 50%; left: 50%;
            width: 150%; height: 30px; 
            background: linear-gradient(transparent, rgba(223, 194, 140, 0.3), transparent);
            transform: translate(-50%, -50%) rotate(45deg);
            animation: beamRotate 4s linear infinite;
            z-index: 1; pointer-events: none;
        }

        @keyframes beamRotate {
            0% { transform: translate(-50%, -50%) rotate(0deg) translateY(-80px); }
            100% { transform: translate(-50%, -50%) rotate(360deg) translateY(-80px); }
        }

        .elite-btn::after {
            content: ""; position: absolute; inset: 1.2px;
            background: #080808; border-radius: 17px; z-index: 2;
        }

        .btn-content { position: relative; z-index: 3; display: flex; align-items: center; width: 100%; }
        
        .icon-premium { 
            width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            margin-right: 16px; background: rgba(223, 194, 140, 0.06); border-radius: 10px;
            border: 1px solid rgba(223, 194, 140, 0.12); transition: 0.4s;
        }
        .icon-premium img { width: 20px; filter: drop-shadow(0 0 4px rgba(223, 194, 140, 0.3)); }
        
        .text-zone { flex-grow: 1; text-align: left; }
        .text-zone strong { display: block; font-size: 1rem; font-family: 'Cinzel', serif; letter-spacing: 1.2px; color: #DFC28C; }
        .text-zone span { font-size: 0.65rem; color: rgba(255,255,255,0.3); }
        
        .arrow-action { font-size: 1rem; color: #DFC28C; opacity: 0.3; transition: 0.4s; }

        .elite-btn:hover { transform: translateY(-4px); border-color: rgba(223, 194, 140, 0.4); box-shadow: 0 12px 25px rgba(0,0,0,0.5); }
        .elite-btn:hover .icon-premium { background: rgba(223, 194, 140, 0.15); transform: scale(1.03); }
        .elite-btn:hover .arrow-action { opacity: 1; transform: translateX(4px); }

        /* --- Social Mini --- */
        .social-mini-group { display: flex; justify-content: center; gap: 16px; margin-top: 35px; }
        .mini-icon { 
            padding: 12px; background: rgba(255, 255, 255, 0.03); border-radius: 14px; 
            border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.4s; display: flex; 
        }
        .mini-icon img { width: 18px; opacity: 0.5; transition: 0.3s; }
        .mini-icon:hover { background: rgba(223, 194, 140, 0.12); transform: translateY(-6px); border-color: rgba(223, 194, 140, 0.3); }
        .mini-icon:hover img { opacity: 1; }

        /* --- Modal --- */
        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); 
            display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.4s; z-index: 1000; 
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-card { background: #0a0a0a; padding: 40px; border-radius: 30px; border: 1px solid rgba(223, 194, 140, 0.4); text-align: center; max-width: 320px; }
        .modal-close { margin-top: 25px; background: #DFC28C; border: none; color: #000; padding: 10px 30px; border-radius: 50px; cursor: pointer; font-weight: 700; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="modal-overlay" id="comingSoonModal">
        <div class="modal-card">
            <p style="font-family: 'Cinzel', serif; letter-spacing: 2px; color: #DFC28C; font-size: 1rem; margin-top: 0;">COMING SOON</p>
            <p style="font-size: 0.8rem; color: rgba(255,255,255,0.5); line-height: 1.6; margin-bottom: 0;">ขณะนี้ยังไม่เปิดให้บริการครับ <br> โปรดติดตามข่าวสารเร็วๆ นี้</p>
            <button class="modal-close" onclick="closeModal()">รับทราบ</button>
        </div>
    </div>

    <div class="main-card">
        
        <div class="live-capsule-corner">
            <img src="https://img.icons8.com/material-rounded/24/ffffff/visible.png" class="eye-icon-micro" alt="Views">
            <span class="c-label">VIEWS</span>
            <img src="https://count.getloli.com/get/@rayeshofficiall_rayesh?theme=asoul" alt="Counter" style="height: 14px; filter: invert(1) brightness(2); opacity: 0.8;">
        </div>

        <div class="content-relative">
            <div class="profile-zone">
                <div class="ring-outer"></div>
                <div class="ring-inner"></div>
                <div class="profile-wrapper">
                    <img src="https://i.ibb.co/LXpzJMgk/profile.jpg" alt="Rayesh" class="profile-img">
                </div>
            </div>
            
            <center><div class="status-badge"><div class="dot"></div> LIVE NOW</div></center>
            
            <h1 class="title-premium">RAYESH</h1>
            <span class="tag-line">Excellence in Streaming</span>
            
            <p class="bio-description">
                Official destination for <strong>Donations</strong> and support. <br>
                Join our <strong>Discord</strong> for exclusive community updates.
            </p>

            <div class="links-area">
                <a href="https://easydonate.app/Console_X" class="elite-btn" target="_blank" rel="noopener">
                    <div class="btn-content">
                        <div class="icon-premium"><img src="https://img.icons8.com/ios-filled/50/DFC28C/wallet.png" alt="Donate"></div>
                        <div class="text-zone"><strong>DONATE</strong><span>Support Rayesh via EasyDonate</span></div>
                        <div class="arrow-action">→</div>
                    </div>
                </a>

                <a href="https://discord.gg/5Epq3Bsh6W" class="elite-btn" target="_blank" rel="noopener">
                    <div class="btn-content">
                        <div class="icon-premium"><img src="https://img.icons8.com/ios-filled/50/DFC28C/discord-logo.png" alt="Discord"></div>
                        <div class="text-zone"><strong>DISCORD</strong><span>Join our elite community</span></div>
                        <div class="arrow-action">→</div>
                    </div>
                </a>
            </div>

            <div class="social-mini-group">
                <a href="https://www.tiktok.com/@rayesh_unre?_r=1&_t=ZS-94u8TLKgN0e" target="_blank" class="mini-icon" rel="noopener" title="TikTok"><img src="https://img.icons8.com/ios-filled/50/ffffff/tiktok.png" alt="Tiktok"></a>
                <div class="mini-icon" style="cursor: pointer;" onclick="openModal()" title="YouTube"><img src="https://img.icons8.com/ios-filled/50/ffffff/youtube-play.png" alt="YouTube"></div>
                <div class="mini-icon" style="cursor: pointer;" onclick="openModal()" title="Facebook"><img src="https://img.icons8.com/ios-filled/50/ffffff/facebook-new.png" alt="Facebook"></div>
            </div>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('comingSoonModal').classList.add('show'); }
        function closeModal() { document.getElementById('comingSoonModal').classList.remove('show'); }
        document.getElementById('comingSoonModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
    </script>
</body>
</html>
