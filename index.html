<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rayesh | Official Links</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;500;600&family=Sarabun:wght@200;400;500&display=swap" rel="stylesheet">

    <style>
        /* Base Setup */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; padding: 0;
            background-color: #060606;
            background-image: 
                radial-gradient(circle at 50% -10%, #251d0f 0%, transparent 40%),
                radial-gradient(circle at 0% 100%, #0d1217 0%, transparent 20%);
            color: #ffffff;
            font-family: 'Montserrat', 'Sarabun', sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px; 
            padding: 40px 0;
            text-align: center;
        }

        /* --- Profile Section --- */
        .profile-wrapper {
            width: 125px; height: 125px;
            border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            margin-bottom: 25px;
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px;
            overflow: hidden;
            border: 1px solid rgba(223, 194, 140, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .profile-wrapper::after {
            content: '';
            position: absolute;
            top: -50%; left: -150%;
            width: 200%; height: 200%;
            background: linear-gradient(135deg, transparent, rgba(223, 194, 140, 0.2) 50%, transparent);
            transform: rotate(-45deg);
            animation: profileShine 6s infinite;
        }

        .profile-img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #060606;
            z-index: 1;
        }

        @keyframes profileShine {
            0% { left: -150%; }
            20%, 100% { left: 150%; }
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.6rem;
            margin: 0; color: #DFC28C; 
            letter-spacing: 10px;
            font-weight: 700;
            text-shadow: 0 4px 15px rgba(223, 194, 140, 0.2);
        }

        .bio-text {
            font-size: 0.9rem;
            color: #aaa;
            margin: 15px auto 35px; 
            line-height: 1.7;
            letter-spacing: 0.5px;
        }
        
        .bio-text .eng-top { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 8px; 
            color: #DFC28C;
            font-size: 0.7rem;
            letter-spacing: 4px;
            opacity: 0.7;
        }

        /* --- Luxury Buttons: Border Beam Effect --- */
        .links-wrapper {
            display: flex; flex-direction: column; gap: 16px;
        }

        .btn-card {
            position: relative;
            display: flex; align-items: center;
            background: #0c0c0c; /* พื้นหลังเข้มเพื่อให้ขอบวิ่งชัด */
            color: #ffffff; text-decoration: none;
            padding: 18px 24px;
            border-radius: 20px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.7s forwards cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* ลูกเล่นลำแสงวิ่งรอบขอบ (Border Beam) */
        .btn-card::before {
            content: "";
            position: absolute;
            inset: -1px;
            background: conic-gradient(from 0deg, transparent, transparent, #DFC28C, transparent, transparent);
            animation: rotateBeam 4s linear infinite;
            opacity: 0.2;
        }

        /* ชั้นทับด้านในเพื่อให้เหลือแค่ขอบวิ่ง */
        .btn-card::after {
            content: "";
            position: absolute;
            inset: 1px;
            background: #0c0c0c;
            border-radius: 19px;
            z-index: 0;
        }

        @keyframes rotateBeam {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .btn-card:nth-child(1) { animation-delay: 0.2s; }
        .btn-card:nth-child(2) { animation-delay: 0.4s; }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-box {
            position: relative; z-index: 1;
            width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            margin-right: 18px;
            background: rgba(223, 194, 140, 0.05);
            border-radius: 14px;
            border: 1px solid rgba(223, 194, 140, 0.1);
        }

        .icon-box img {
            width: 22px; height: 22px;
            filter: brightness(0) invert(85%) sepia(20%) saturate(600%) hue-rotate(350deg);
        }

        .text-group { position: relative; z-index: 1; flex-grow: 1; text-align: left; }
        
        .text-group strong {
            display: block; 
            font-size: 1.05rem;
            font-family: 'Cinzel', serif;
            letter-spacing: 1.5px;
            /* ลูกเล่นแสงวิ่งผ่านตัวอักษร */
            background: linear-gradient(to right, #DFC28C 20%, #fff 50%, #DFC28C 80%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 4s linear infinite;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        .text-group span { 
            display: block; font-size: 0.75rem; color: #777; margin-top: 2px;
        }

        .arrow { 
            position: relative; z-index: 1;
            font-size: 1.1rem; color: #DFC28C; opacity: 0.4; transition: 0.4s;
        }

        /* --- Hover Effects --- */
        @media (hover: hover) {
            .btn-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 15px 30px rgba(0,0,0,0.6), 0 0 15px rgba(223, 194, 140, 0.1);
            }
            .btn-card:hover::before {
                opacity: 1; /* แสงขอบชัดขึ้นเมื่อวางเมาส์ */
                animation-duration: 2s; /* วิ่งเร็วขึ้น */
            }
            .btn-card:hover .arrow { 
                opacity: 1; transform: translateX(5px);
            }
        }

        .btn-card:active { transform: scale(0.97); }

    </style>
</head>
<body>

    <div class="container">
        <div class="profile-wrapper">
            <img src="https://i.ibb.co/LXpzJMgk/profile.jpg" alt="Rayesh" class="profile-img">
        </div>
        
        <h1>RAYESH</h1>
        
        <p class="bio-text">
            <span class="eng-top">THANK YOU FOR SUPPORT</span>
            ช่องทางสำหรับ <strong>โดเนท</strong> สนับสนุนสตรีมเมอร์ <br>
            และ <strong>ดิสคอร์ด</strong> สำหรับพูดคุยติดตามข่าวสารครับ
        </p>

        <div class="links-wrapper">
            <a href="https://easydonate.app/Console_X" class="btn-card" target="_blank" rel="noopener">
                <div class="icon-box">
                    <img src="https://img.icons8.com/ios-filled/50/ffffff/wallet.png" alt="Donate">
                </div>
                <div class="text-group">
                    <strong>DONATE</strong>
                    <span>สนับสนุนผ่าน EasyDonate</span>
                </div>
                <div class="arrow">→</div>
            </a>

            <a href="https://discord.gg/5Epq3Bsh6W" class="btn-card" target="_blank" rel="noopener">
                <div class="icon-box">
                    <img src="https://img.icons8.com/ios-filled/50/ffffff/discord-logo.png" alt="Discord">
                </div>
                <div class="text-group">
                    <strong>DISCORD</strong>
                    <span>พูดคุยและร่วมกิจกรรมในคอมมูนิตี้</span>
                </div>
                <div class="arrow">→</div>
            </a>
        </div>
    </div>

</body>
</html>
